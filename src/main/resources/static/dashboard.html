<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body{
            font-family: Arial;
            background:#0b1c17;
            color:white;
            text-align:center;
            padding-top:80px;
        }

        .card{
            background:#102a23;
            padding:30px;
            width:400px;
            margin:auto;
            border-radius:10px;
        }

        button{
            padding:10px 20px;
            background:#2ecc71;
            border:none;
            border-radius:6px;
            margin-top:15px;
            cursor:pointer;
            width:200px;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Welcome 🎉</h1>

    <!-- Logged User Email -->
    <h3 id="userEmail"></h3>

    <!-- Create Report -->
    <button onclick="goReport()">Create Report</button>

    <!-- ✅ NEW : View Reports -->
    <button onclick="viewReports()">View Reports</button>

    <!-- Logout -->
    <button onclick="logout()">Logout</button>
</div>

<script>

    // Show logged user email
    document.getElementById("userEmail").innerText =
        localStorage.getItem("userEmail");

    // Go to report page
    function goReport(){
        window.location.href="report.html";
    }

    // ✅ Go to view reports page
    function viewReports(){
        window.location.href="viewsreport.html";
    }

    // Logout
    function logout(){
        localStorage.clear();
        window.location.href="index.html";
    }

</script>

</body>
</html>
