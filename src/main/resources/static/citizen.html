<!DOCTYPE html>
<html>
<head>
<title>Citizen Dashboard</title>

<style>
body{
font-family:'Segoe UI', Arial, sans-serif;
background:linear-gradient(135deg,#e6f4ea,#f4fbf7);
color:#1f2937;
padding:40px;
}

.container{
width:600px;
margin:auto;
background:#ffffff;
padding:35px;
border-radius:16px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

h2{
color:#15803d;
text-align:center;
margin-bottom:15px;
}

.section{
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #d1d5db;
background:#f9fafb;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#16a34a;
font-weight:600;
color:white;
cursor:pointer;
}

button:hover{
background:#15803d;
}

.logout-btn{
background:#374151;
margin-bottom:20px;
}

.alert-card{
background:#ffffff;
padding:18px;
margin-top:15px;
border-radius:12px;
border-left:6px solid #2563eb;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.alert-card h3{
color:#1e3a8a;
}

.alert-card p{
margin:4px 0;
font-size:14px;
}

.no-alert{
text-align:center;
color:#6b7280;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="section">

<h2>🚨 Disaster Alerts</h2>

<button onclick="loadAlerts()">Get Alerts</button>

<select id="severityFilter" onchange="loadAlerts()" style="width:100%;padding:10px;margin-top:10px;border-radius:8px;">
<option value="ALL">All Alerts</option>
<option value="HIGH">HIGH</option>
<option value="MEDIUM">MEDIUM</option>
<option value="LOW">LOW</option>
</select>

<div id="alerts"></div>

</div>

<hr>

<div class="section">

<h2>🆘 Request Emergency Help</h2>

<input id="helpLocation" placeholder="Enter your location">
<input id="description" placeholder="Describe your emergency">
<input id="contact" placeholder="Enter phone number">

<button onclick="sendHelpRequest()">Send Help Request</button>

</div>

</div>

<script>

const BASE_URL = "http://localhost:9595/api/disasters";

const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if(!token || role !== "CITIZEN"){
alert("Please login first");
window.location.href="login.html";
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}

function loadAlerts(){

fetch(BASE_URL)
.then(res=>res.json())
.then(data=>{

const container=document.getElementById("alerts");
container.innerHTML="";

if(data.length===0){
container.innerHTML="<p class='no-alert'>No alerts found</p>";
return;
}

const selectedSeverity=document.getElementById("severityFilter").value;

const filteredData= selectedSeverity==="ALL"
? data
: data.filter(a=>a.severity===selectedSeverity);

filteredData.forEach(alert=>{

let borderColor="#2563eb";
let badgeColor="#2563eb";

if(alert.severity==="HIGH"){
borderColor="#dc2626";
badgeColor="#dc2626";
}
else if(alert.severity==="MEDIUM"){
borderColor="#f59e0b";
badgeColor="#f59e0b";
}
else if(alert.severity==="LOW"){
borderColor="#16a34a";
badgeColor="#16a34a";
}

container.innerHTML+=`

<div class="alert-card" style="border-left:6px solid ${borderColor}">

<h3>${alert.title}</h3>

<p><b>Description:</b> ${alert.description}</p>

<p><b>Type:</b> ${alert.type}</p>

<p><b>Location:</b> ${alert.location}</p>

<p><b>Latitude:</b> ${alert.latitude}</p>

<p><b>Longitude:</b> ${alert.longitude}</p>

<p><b>Reported Time:</b> ${alert.reportedTime}</p>

<p>
<b>Severity:</b>
<span style="
background:${badgeColor};
color:white;
padding:4px 8px;
border-radius:6px;
font-size:12px;
font-weight:600;">
${alert.severity}
</span>
</p>

</div>

`;

});

})

.catch(err=>{
console.error(err);
alert("Failed to load alerts");
});

}

function sendHelpRequest(){

fetch("http://localhost:9595/api/help",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

location:helpLocation.value,
description:description.value,
contact:contact.value,
status:"PENDING"

})

})

.then(res=>res.json())

.then(()=>{

alert("Help request sent");

helpLocation.value="";
description.value="";
contact.value="";

})

.catch(()=>{

alert("Failed to send help request");

});

}

loadAlerts();
setInterval(loadAlerts,5000);

</script>

</body>
</html>
